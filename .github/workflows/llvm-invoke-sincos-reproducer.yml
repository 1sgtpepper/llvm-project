name: LLVM invoke sincos reproducer

on:
  push:
    branches:
      - correctness-validation
    paths:
      - .github/workflows/llvm-invoke-sincos-reproducer.yml
      - .github/scripts/invoke-sincos.ll
      - .github/scripts/invoke-sincos.cpp
  workflow_dispatch:
    inputs:
      llvm_run_id:
        description: Workflow run containing the LLVM correctness tools artifact
        required: true
        default: "29673050071"

permissions:
  actions: read
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: llvm-correctness-tools
          path: artifacts/llvm
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.llvm_run_id || '29673050071' }}

      - name: Extract tools
        run: |
          mkdir -p tools/llvm results
          tar -xzf artifacts/llvm/llvm-correctness-tools.tar.gz -C tools/llvm
          chmod +x tools/llvm/bin/*
          tools/llvm/bin/clang --version | tee results/clang-version.txt
          cat tools/llvm/revision.txt | tee results/llvm-revision.txt

      - name: Verify input and run InstCombine
        id: ir
        continue-on-error: true
        run: |
          set +e
          tools/llvm/bin/opt -passes=verify -disable-output \
            .github/scripts/invoke-sincos.ll \
            >results/input-verify.stdout 2>results/input-verify.stderr
          input_status=$?
          tools/llvm/bin/opt -passes=instcombine -verify-each -S \
            .github/scripts/invoke-sincos.ll -o results/instcombine.ll \
            >results/instcombine.stdout 2>results/instcombine.stderr
          instcombine_status=$?
          printf 'input_status=%s\ninstcombine_status=%s\n' \
            "$input_status" "$instcombine_status" | tee results/ir-status.txt
          test "$input_status" -eq 0
          test "$instcombine_status" -eq 0

      - name: Compile valid C++ source
        id: source
        continue-on-error: true
        run: |
          set +e
          for level in 0 1 2 3; do
            tools/llvm/bin/clang --driver-mode=g++ -std=c++17 -O"$level" \
              -S -emit-llvm .github/scripts/invoke-sincos.cpp \
              -o results/source-o"$level".ll \
              >results/source-o"$level".stdout \
              2>results/source-o"$level".stderr
            printf 'O%s=%s\n' "$level" "$?"
          done | tee results/source-status.txt

      - name: Record outcome
        if: always()
        run: |
          cat > results/summary.txt <<EOF
          attempt=${{ matrix.attempt }}
          ir_outcome=${{ steps.ir.outcome }}
          source_outcome=${{ steps.source.outcome }}
          llvm_revision=$(cat tools/llvm/revision.txt)
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: invoke-sincos-results-${{ matrix.attempt }}
          path: results
          retention-days: 1
