name: LLVM GCC torture differential correctness

on:
  push:
    branches:
      - correctness-validation
    paths:
      - .github/workflows/llvm-gcc-torture-differential.yml
      - .github/scripts/run-gcc-torture-differential.sh
  workflow_dispatch:
    inputs:
      llvm_run_id:
        description: Workflow run containing the LLVM correctness tools artifact
        required: true
        default: "29673050071"

permissions:
  actions: read
  contents: read

jobs:
  differential:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: gcc-mirror/gcc
          ref: ddeb9b30a26ce61c836efe70893c77a67f7b737e
          path: gcc-corpus
          filter: blob:none
          sparse-checkout: gcc/testsuite/gcc.c-torture/execute

      - uses: actions/download-artifact@v4
        with:
          name: llvm-correctness-tools
          path: artifacts/llvm
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.llvm_run_id || '29673050071' }}

      - name: Extract compiler
        run: |
          mkdir -p tools/llvm
          tar -xzf artifacts/llvm/llvm-correctness-tools.tar.gz -C tools/llvm
          chmod +x tools/llvm/bin/*

      - name: Run differential corpus
        run: |
          bash .github/scripts/run-gcc-torture-differential.sh \
            "$PWD/tools/llvm" \
            "$PWD/gcc-corpus" \
            "$PWD/results"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gcc-torture-results
          path: results
          retention-days: 1
