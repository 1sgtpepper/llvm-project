name: YARPGen generator

on:
  push:
    branches:
      - correctness-validation
    paths:
      - .github/workflows/yarpgen-generator.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-generator:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout YARPGen
        uses: actions/checkout@v4
        with:
          repository: intel/yarpgen
          ref: e0f63b6580cc9f1c50d18928a4273106dc3a6c41

      - name: Build generator
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -- -j2

      - name: Package generator
        run: |
          mkdir -p package/bin
          cp build/yarpgen package/bin/
          printf '%s\n' e0f63b6580cc9f1c50d18928a4273106dc3a6c41 > package/revision.txt
          tar -czf yarpgen-generator.tar.gz -C package .

      - uses: actions/upload-artifact@v4
        with:
          name: yarpgen-generator
          path: yarpgen-generator.tar.gz
          retention-days: 1
