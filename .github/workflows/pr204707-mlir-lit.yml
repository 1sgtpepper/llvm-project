name: PR204707 MLIR lit verification

on:
  push:
    branches:
      - ci/pr204707-mlir-lit
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mlir-lit:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout LLVM
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Configure MLIR test build
        run: |
          cmake -S llvm -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DLLVM_USE_LINKER=lld \
            -DLLVM_ENABLE_PROJECTS=mlir \
            -DLLVM_TARGETS_TO_BUILD=host \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_TESTS=ON \
            -DMLIR_INCLUDE_TESTS=ON

      - name: Build MLIR test tools
        run: |
          ninja -C build mlir-translate mlir-opt FileCheck not

      - name: Run targeted MLIR lit tests
        run: |
          python3 build/bin/llvm-lit -sv \
            mlir/test/Dialect/LLVMIR/invalid.mlir \
            mlir/test/Target/LLVMIR/Import/function-attributes.ll \
            mlir/test/Target/LLVMIR/Import/function-entry-count-roundtrip.ll \
            mlir/test/Target/LLVMIR/llvmir.mlir
